<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>spannora · setup</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f1115" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="spannora" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => { /* ignore */ });
        });
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #151922;
        --border: #252a36;
        --text: #e6e9ef;
        --muted: #8a93a6;
        --accent: #7aa2f7;
        --error: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 420px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        color: var(--accent);
      }
      .lead {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 13px;
      }
      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 12px;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 10px 12px;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        font-size: 13px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      input[name="token"] {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
      }
      button {
        margin-top: 18px;
        width: 100%;
        padding: 10px 14px;
        background: var(--accent);
        color: #0b0e13;
        border: none;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .error {
        margin-top: 12px;
        padding: 8px 10px;
        background: #2a1010;
        border: 1px solid var(--error);
        color: var(--error);
        border-radius: 6px;
        font-size: 12px;
      }
      .error.hidden { display: none; }
      .hint {
        margin-top: 14px;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <form class="card" id="setup-form">
      <h1>Set up spannora</h1>
      <p class="lead">Create your account. Find the one-time setup token in your server logs.</p>

      <label for="token">Setup token</label>
      <input id="token" name="token" required autocomplete="off" spellcheck="false" />

      <label for="username">Username</label>
      <input id="username" name="username" required autocomplete="username" />

      <label for="password">Password (8+ characters)</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />

      <button id="submit" type="submit">Create account</button>

      <div id="error" class="error hidden"></div>
      <div class="hint">The token is printed once on server startup. If you lost it, restart the server (with no users in the DB) to generate a new one.</div>
    </form>
    <script src="/setup.js"></script>
  </body>
</html>
