<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" role="img" aria-label="spannora architecture: browser PWA connects over HTTPS and SSE to the spannora server on your Linux VM, which embeds the Claude Agent SDK and talks to the Anthropic API.">
  <title>spannora architecture diagram</title>
  <desc>A browser or installed PWA on the left talks over HTTPS and an SSE stream to the spannora server running on your Linux VM in the middle. The server embeds the Claude Agent SDK, which connects out to the Anthropic API (Claude) on the right. The browser never talks to Anthropic directly.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0aa"/>
    </marker>
  </defs>

  <style>
    .box { fill: #181b22; stroke: #2a2e38; stroke-width: 1.5; rx: 10; }
    .box-vm { fill: #20242d; stroke: #2a2e38; stroke-width: 1.5; stroke-dasharray: 4 3; rx: 12; }
    .title { fill: #e8e8ec; font: 600 16px var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif); }
    .sub   { fill: #9aa0aa; font: 12px var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif); }
    .tag   { fill: #9aa0aa; font: 11px var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace); }
    .edge-label { fill: #9aa0aa; font: 11px var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif); }
    .accent { fill: #6ea8fe; }
    .vm-label { fill: #6ea8fe; font: 600 11px var(--font-mono, ui-monospace, "SF Mono", Menlo, monospace); letter-spacing: 0.08em; text-transform: uppercase; }
  </style>

  <!-- Linux VM enclosure (wraps the middle node) -->
  <rect class="box-vm" x="290" y="40" width="320" height="240" rx="12"/>
  <text class="vm-label" x="306" y="62">Your Linux VM</text>

  <!-- Browser / PWA -->
  <rect class="box" x="40" y="100" width="200" height="120" rx="10"/>
  <circle class="accent" cx="60" cy="124" r="5"/>
  <text class="title" x="74" y="129">Browser / PWA</text>
  <text class="sub" x="56" y="160">User's phone, laptop,</text>
  <text class="sub" x="56" y="178">or installed PWA.</text>
  <text class="tag" x="56" y="202">vanilla ES modules</text>

  <!-- spannora server (inside VM) -->
  <rect class="box" x="320" y="100" width="260" height="160" rx="10"/>
  <circle class="accent" cx="340" cy="124" r="5"/>
  <text class="title" x="354" y="129">spannora server</text>
  <text class="sub" x="336" y="160">node:http · SQLite · auth.</text>
  <text class="sub" x="336" y="178">SSE for chat streaming.</text>
  <text class="vm-label" x="336" y="208">EMBEDS</text>
  <rect class="box" x="336" y="216" width="228" height="32" rx="6" fill="#0f1115"/>
  <text class="tag" x="348" y="236" fill="#e8e8ec">@anthropic-ai/claude-agent-sdk</text>

  <!-- Anthropic API -->
  <rect class="box" x="660" y="100" width="180" height="120" rx="10"/>
  <circle class="accent" cx="680" cy="124" r="5"/>
  <text class="title" x="694" y="129">Anthropic API</text>
  <text class="sub" x="676" y="160">Claude (Opus, Sonnet,</text>
  <text class="sub" x="676" y="178">Haiku) + tool execution.</text>
  <text class="tag" x="676" y="202">api.anthropic.com</text>

  <!-- Edges: browser ⇄ spannora -->
  <line x1="240" y1="148" x2="320" y2="148" stroke="#6ea8fe" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="178" x2="240" y2="178" stroke="#9aa0aa" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-muted)"/>
  <text class="edge-label" x="248" y="142">HTTPS</text>
  <text class="edge-label" x="246" y="196">SSE stream</text>

  <!-- Edges: spannora ⇄ Anthropic -->
  <line x1="580" y1="148" x2="660" y2="148" stroke="#6ea8fe" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="178" x2="580" y2="178" stroke="#9aa0aa" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-muted)"/>
  <text class="edge-label" x="588" y="142">Agent SDK</text>
  <text class="edge-label" x="588" y="196">tokens</text>
</svg>
